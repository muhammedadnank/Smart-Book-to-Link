<body>

    <div class="toolbar">
        <button class="toolbar-btn" id="btn-toc" title="Toggle Table of Contents">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            TOC
        </button>

        <div class="toolbar-divider"></div>

        <div class="toolbar-title">
            <strong>{{ file_name }}</strong>
        </div>

        <div class="progress-wrap" id="progress-wrap">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progress-bar"></div>
            </div>
            <span id="progress-text">0%</span>
        </div>

        <div class="toolbar-divider"></div>

        <button class="toolbar-btn" id="btn-theme-light" title="Light theme" aria-label="Light theme" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
            </svg>
        </button>
        <button class="toolbar-btn" id="btn-theme-sepia" title="Sepia theme" aria-label="Sepia theme" aria-pressed="false">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4zm0 16V14l2.5-1.5L11 14v.5l-.08.08L6 20zm12 0h-9.92l3.42-3.42L14 18.08V14l2.5-1.5L19 14v6zm0-8l-2.5-1.5L13 12V4h5v8z"/>
            </svg>
        </button>
        <button class="toolbar-btn active" id="btn-theme-dark" title="Dark theme" aria-label="Dark theme" aria-pressed="true">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
                <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
            </svg>
        </button>

        <div class="toolbar-divider" id="fit-divider" style="display:none"></div>
        <button class="toolbar-btn" id="btn-fit-mode" title="Toggle Fit Page / Fit Width" style="display:none">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" id="fit-icon-page"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" id="fit-icon-width" style="display:none"><path d="M2 4h20v2H2V4zm0 14h20v2H2v-2zm2-8h16v4H4v-4z"/></svg>
            <span id="fit-text">Fit Page</span>
        </button>

        <div class="toolbar-divider"></div>

        <a class="toolbar-btn" href="{{ src|safe }}" download="{{ file_name }}" title="Download file">
            <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v6h5.66V9h3.84L12 2z"/></svg>
            Download
        </a>
    </div>

    <!-- Mobile sidebar backdrop -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

    <div class="layout">
        <nav class="sidebar hidden" id="sidebar">
            <div class="sidebar-header">Table of Contents</div>
            <ul class="toc-list" id="toc-list">
                <li class="toc-item"><a href="#" style="color:var(--text-muted);font-style:italic">Loading…</a></li>
            </ul>
        </nav>

        <div class="reader-wrap" id="reader-wrap">
            <div class="font-size-bar" id="font-size-bar">
                <span class="label">Font size:</span>
                <button class="font-btn" id="font-dec" aria-label="Decrease font size" title="Decrease font size (−)">−</button>
                <span class="font-size-val" id="font-size-val">100%</span>
                <button class="font-btn" id="font-inc" aria-label="Increase font size" title="Increase font size (+)">+</button>
            </div>

            <!-- Reusable Loading overlay -->
            <div class="loading-overlay" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Loading…</div>
            </div>

            <div id="epub-viewer"></div>
            <div id="pdf-viewer"></div>
            <div id="text-viewer" style="display:none"></div>

            <!-- Reusable navigation buttons -->
            <button class="nav-arrow nav-prev" id="prev-btn" title="Previous page (←)">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="nav-arrow nav-next" id="next-btn" title="Next page (→)">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>

            <div class="error-screen" id="error-screen">
                <div class="error-icon">
                    <svg viewBox="0 0 48 48" width="48" height="48" fill="none" aria-hidden="true">
                        <circle cx="24" cy="24" r="22" stroke="var(--text-muted)" stroke-width="1.5"/>
                        <path d="M24 14v14M24 34v2" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="error-title">Unable to render this file</div>
                <div class="error-desc" id="error-desc">This file format may not be supported for inline viewing.</div>
                <a class="download-btn" href="{{ src|safe }}" download="{{ file_name }}">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v6h5.66V9h3.84L12 2z"/></svg>
                    Download instead
                </a>
            </div>
        </div>
    </div>

    <div class="kb-hint">← → arrow keys to turn pages &nbsp;·&nbsp; T toggle contents</div>
