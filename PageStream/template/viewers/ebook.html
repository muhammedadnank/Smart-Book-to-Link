<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }} — Reader</title>
    <!-- P6: dark scrollbars/form controls matching page theme -->
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#0f0e17">
    <meta name="theme-color" content="#0f0e17">
    <meta name="description" content="Reading: {{ file_name }}">

    <link rel="icon" type="image/jpeg" href="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- JSZip (for EPUB.js and Comic parsing) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous"></script>
    <!-- EPUB.js -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <!-- DjVu.js -->
    <script src="https://cdn.jsdelivr.net/npm/djvujs@0.5.3/dist/djvu.min.js"></script>

    {% include 'viewers/partials/_styles.html' %}
</head>
<body>

    {% include 'viewers/partials/_html.html' %}

<script>
(function () {
    const FILE_URL  = "{{ src|safe }}";
    const FILE_NAME = "{{ file_name }}";
    const FILE_TYPE = "{{ file_type }}";

    {% include 'viewers/partials/_js_core.html' %}
    {% include 'viewers/partials/_js_epub.html' %}
    {% include 'viewers/partials/_js_pdf.html' %}
    {% include 'viewers/partials/_js_comic.html' %}
    {% include 'viewers/partials/_js_offline.html' %}
    {% include 'viewers/partials/_js_txt.html' %}
    {% include 'viewers/partials/_js_fb2.html' %}
    {% include 'viewers/partials/_js_djvu.html' %}
    {% include 'viewers/partials/_js_download.html' %}
    {% include 'viewers/partials/_js_dispatch.html' %}
})();
</script>
</body>
</html>
