<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Logs - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121e;
            --accent-glow: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(168, 85, 247, 0.04) 50%, transparent 100%);
            --accent-purple: #a855f7;
            --accent-blue: #6366f1;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --glass-bg: rgba(18, 18, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-highlight: rgba(255, 255, 255, 0.08);
            --terminal-bg: #050505;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        h1, h2, h3, .brand { font-family: 'Outfit', sans-serif; }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: var(--accent-glow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 { top: -200px; right: -200px; }
        .glow-2 { bottom: -200px; left: -200px; }

        nav {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(10, 10, 15, 0.85);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary) 30%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand i { color: var(--accent-purple); -webkit-text-fill-color: initial; }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-highlight);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 2.25rem;
            font-weight: 800;
        }

        .terminal-container {
            background: var(--terminal-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .terminal-header {
            background: #1e1e1e;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #333;
        }
        
        .terminal-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .terminal-title {
            margin: 0 auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #888;
            padding-right: 42px; /* Offset for center alignment */
        }

        .terminal-body {
            padding: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #a9b7c6;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 60vh;
        }
        
        /* Auto-scroll to bottom behavior logic will be in JS */

        footer {
            border-top: 1px solid var(--glass-border);
            padding: 1.5rem;
            text-align: center;
            background: #06060a;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: auto;
        }
        /* --- Responsive Design --- */
        @media (max-width: 800px) {
            .nav-container { flex-direction: column; gap: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            main { padding: 1.5rem 1rem; }
            .page-header h1 { font-size: 1.75rem; }
            .stats-grid { grid-template-columns: 1fr; gap: 1rem; }
            .dashboard-sections { grid-template-columns: 1fr; }
            .glass-card { padding: 1.25rem; }
            .search-form { width: 100%; }
            .search-input { width: 100%; flex: 1; }
        }
        @media (max-width: 480px) {
            .brand { font-size: 1.1rem; }
            .brand span { display: none; }
            .nav-container { flex-direction: row; justify-content: space-between; gap: 0.5rem; }
            .nav-links { gap: 0.4rem; }
            .nav-btn { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
            th, td { padding: 1rem 0.5rem; font-size: 0.85rem; }
            .action-btns { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <nav>
        <div class="nav-container">
            <div class="brand">
                <i class="fa-solid fa-book-open-reader"></i>
                <span>PageStream Admin</span>
            </div>
            <div class="nav-links">
                <a href="/admin" class="nav-btn btn-secondary">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </a>
                <a href="/admin/files" class="nav-btn btn-secondary">
                    <i class="fa-solid fa-folder-open"></i> Files
                </a>
                <a href="/admin/logout" class="nav-btn btn-danger">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1>Server Logs</h1>
            <button onclick="window.location.reload()" class="btn-primary">
                <i class="fa-solid fa-rotate-right"></i> Refresh Logs
            </button>
        </div>

        <div class="terminal-container">
            <div class="terminal-header">
                <div class="terminal-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <div class="terminal-title">~/PageStream.log</div>
            </div>
            <div class="terminal-body" id="log-container">{{ logs }}</div>
        </div>
    </main>

    <footer>
        <p>© 2026 PageStream. Powered by <a href="https://github.com/muhammedadnank/Smart-Book-to-Link" target="_blank" rel="noopener">PageStream</a>.</p>
    </footer>

    <script>
        // Auto scroll to the bottom of the logs on page load
        document.addEventListener("DOMContentLoaded", function() {
            var container = document.getElementById("log-container");
            container.scrollTop = container.scrollHeight;
            
            // Add a polling reload every 15 seconds if preferred
            // setTimeout(() => window.location.reload(), 15000);
        });
    </script>
</body>
</html>
