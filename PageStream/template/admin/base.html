<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - PageStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121e;
            --accent-glow: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(168, 85, 247, 0.04) 50%, transparent 100%);
            --accent-purple: #a855f7;
            --accent-blue: #6366f1;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --glass-bg: rgba(18, 18, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-highlight: rgba(255, 255, 255, 0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        h1, h2, h3, .brand { font-family: 'Outfit', sans-serif; }

        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: var(--accent-glow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 { top: -200px; right: -200px; }
        .glow-2 { bottom: -200px; left: -200px; }

        /* ── Nav ── */
        nav {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(10, 10, 15, 0.85);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary) 30%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand i { color: var(--accent-purple); -webkit-text-fill-color: initial; }
        .nav-links { display: flex; gap: 1rem; align-items: center; }
        .nav-btn {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--glass-highlight);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        /* ── Main layout ── */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            z-index: 10;
        }

        /* ── Glass card ── */
        .glass-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
        }

        /* ── Page header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 { font-size: 2.25rem; font-weight: 800; }

        /* ── Table ── */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; min-width: 700px; border-collapse: collapse; }
        th, td {
            padding: 1.25rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        /* ── Search ── */
        .search-form { display: flex; gap: 0.5rem; }
        .search-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            width: 250px;
        }
        .search-input:focus {
            border-color: var(--accent-purple);
            background: rgba(255, 255, 255, 0.06);
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--glass-border);
            padding: 1.5rem;
            text-align: center;
            background: #06060a;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: auto;
        }
        footer a { color: var(--accent-purple); text-decoration: none; }

        /* ── Responsive ── */
        @media (max-width: 800px) {
            .nav-container { flex-direction: column; gap: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            main { padding: 1.5rem 1rem; }
            .page-header h1 { font-size: 1.75rem; }
            .glass-card { padding: 1.25rem; }
            .search-form { width: 100%; }
            .search-input { width: 100%; flex: 1; }
        }
        @media (max-width: 480px) {
            .brand { font-size: 1.1rem; }
            .brand span { display: none; }
            .nav-container { flex-direction: row; justify-content: space-between; }
            .nav-links { gap: 0.4rem; }
            .nav-btn { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
            th, td { padding: 1rem 0.5rem; font-size: 0.85rem; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <nav>
        <div class="nav-container">
            <div class="brand">
                <i class="fa-solid fa-book-open-reader" aria-hidden="true"></i>
                <span>PageStream Admin</span>
            </div>
            <div class="nav-links">
                {% block nav_links %}
                <a href="/admin" class="nav-btn btn-secondary">
                    <i class="fa-solid fa-chart-pie" aria-hidden="true"></i> Dashboard
                </a>
                <a href="/admin/files" class="nav-btn btn-secondary">
                    <i class="fa-solid fa-folder-open" aria-hidden="true"></i> Files
                </a>
                <a href="/admin/users" class="nav-btn btn-secondary">
                    <i class="fa-solid fa-users-gear" aria-hidden="true"></i> Users
                </a>
                <a href="/admin/logs" class="nav-btn btn-secondary">
                    <i class="fa-solid fa-terminal" aria-hidden="true"></i> Logs
                </a>
                <a href="/admin/logout" class="nav-btn btn-danger">
                    <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i> Logout
                </a>
                {% endblock %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 PageStream. Powered by <a href="https://github.com/muhammedadnank/Smart-Book-to-Link" target="_blank" rel="noopener">PageStream</a>.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
