name: Docker Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    if: github.repository == 'muhammedadnank/Smart-Book-to-Link-project'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: muhammedadnank
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: muhammedadnank/smartbook:latest
