<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/live.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading: {{ file_name }}</title>
    <meta http-equiv="refresh" content="0;url={{ src|safe }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --accent-purple: #a855f7;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --glass-bg: rgba(18, 18, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: pulse 4s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        .container { 
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px; 
            margin: auto; 
        }
        .message { 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.5rem;
            margin-top: 0;
        }

        p { 
            margin-bottom: 24px; 
            font-size: 0.95rem; 
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-word;
        }
        
        .filename {
            color: var(--text-primary);
            font-weight: 500;
        }

        .btn-download { 
            display: inline-block;
            background: linear-gradient(135deg, #6366f1 0%, var(--accent-purple) 100%);
            color: white; 
            text-decoration: none; 
            font-weight: 500; 
            padding: 12px 28px;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            font-family: 'Inter', sans-serif;
        }
        .btn-download:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="container">
        <div class="message">
            <h2>Preparing Download</h2>
            <p>Your download for <br><span class="filename">{{ file_name }}</span><br> should start automatically.</p>
            <a class="btn-download" href="{{ src|safe }}" download="{{ file_name }}">Click Here Manually</a>
        </div>
    </div>
</body>
</html>
