<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ file_name }} — Reader</title>
    <meta name="theme-color" content="#0f0e17">
    <meta name="description" content="Reading: {{ file_name }}">

    <link rel="icon" type="image/jpeg" href="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- EPUB.js -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

    <style>
        :root {
            --bg: #0f0e17;
            --surface: #1a1825;
            --surface2: #221f30;
            --border: #2e2a3d;
            --accent: #e8c27a;
            --accent2: #a78bfa;
            --text: #e8e6f0;
            --text-muted: #8b85a0;
            --reader-bg: #f7f4ef;
            --reader-text: #1a1714;
            --reader-bg-dark: #1c1a25;
            --reader-text-dark: #e0dde8;
            --font-body: 'Lora', Georgia, serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --sidebar-w: 260px;
            --toolbar-h: 56px;
            --radius: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ─────────────────────────────────── */
        .toolbar {
            height: var(--toolbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            flex-shrink: 0;
            z-index: 100;
        }

        .toolbar-title {
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-muted);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toolbar-title strong {
            color: var(--text);
            font-style: normal;
            font-weight: 600;
        }

        .toolbar-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius);
            padding: 6px 10px;
            font-size: 0.78rem;
            font-family: var(--font-mono);
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .toolbar-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(232, 194, 122, 0.08);
        }
        .toolbar-btn.active {
            border-color: var(--accent2);
            color: var(--accent2);
            background: rgba(167, 139, 250, 0.1);
        }
        .toolbar-btn svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

        .toolbar-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 4px;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .progress-bar-outer {
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* ── Layout ───────────────────────────────────── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar (TOC) ────────────────────────────── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.25s ease, width 0.25s ease;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar.hidden {
            transform: translateX(-100%);
            width: 0;
        }

        .sidebar-header {
            padding: 14px 16px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .toc-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding: 8px 0;
        }
        .toc-list::-webkit-scrollbar { width: 4px; }
        .toc-list::-webkit-scrollbar-track { background: transparent; }
        .toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .toc-item a {
            display: block;
            padding: 7px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.83rem;
            line-height: 1.4;
            transition: all 0.12s ease;
            border-left: 2px solid transparent;
        }
        .toc-item a:hover {
            color: var(--text);
            background: rgba(255,255,255,0.04);
        }
        .toc-item a.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(232,194,122,0.06);
        }
        .toc-item.sub a { padding-left: 28px; font-size: 0.78rem; }

        /* ── Reader area ──────────────────────────────── */
        .reader-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .font-size-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .font-size-bar .label { margin-right: 4px; }
        .font-btn {
            background: var(--border);
            border: none;
            color: var(--text);
            width: 26px; height: 26px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.12s;
        }
        .font-btn:hover { background: var(--accent); color: var(--bg); }
        .font-size-val { min-width: 36px; text-align: center; }

        #epub-viewer {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #pdf-viewer {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            background: #2a2838;
        }
        #pdf-viewer::-webkit-scrollbar { width: 6px; }
        #pdf-viewer::-webkit-scrollbar-track { background: transparent; }
        #pdf-viewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .pdf-page-wrap {
            box-shadow: 0 4px 32px rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
            background: white;
            max-width: 100%;
        }
        .pdf-page-wrap canvas { display: block; max-width: 100%; height: auto; }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(26,24,37,0.85);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            width: 38px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius);
            backdrop-filter: blur(4px);
            transition: all 0.15s ease;
            z-index: 10;
        }
        .nav-arrow:hover { color: var(--accent); border-color: var(--accent); background: rgba(26,24,37,0.95); }
        .nav-arrow svg { width: 18px; height: 18px; fill: currentColor; }
        .nav-prev { left: 12px; }
        .nav-next { right: 12px; }

        .loading-overlay {
            position: absolute; inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 50;
            transition: opacity 0.4s ease;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 40px; height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .error-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        .error-icon { font-size: 3rem; opacity: 0.5; }
        .error-title { font-size: 1.2rem; color: var(--text); }
        .error-desc { font-size: 0.87rem; color: var(--text-muted); max-width: 400px; line-height: 1.6; }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--accent), #d4a853);
            color: var(--bg);
            text-decoration: none;
            border-radius: var(--radius);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .download-btn:hover { opacity: 0.85; }

        .kb-hint {
            text-align: center;
            padding: 6px;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            opacity: 0.5;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 640px) {
            .sidebar {
                position: fixed;
                top: var(--toolbar-h);
                left: 0;
                bottom: 0;
                z-index: 200;
                width: min(80vw, 260px);
                box-shadow: 4px 0 20px rgba(0,0,0,0.6);
            }
            .sidebar.hidden {
                transform: translateX(-100%);
                width: min(80vw, 260px); /* keep width so animation is smooth */
            }
            :root { --toolbar-h: 48px; }
            .toolbar { overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 4px; }
            .toolbar-title { display: none; }
            .progress-wrap { display: none; }
            .nav-arrow { width: 32px; height: 52px; }
            #pdf-viewer { padding: 12px 8px; gap: 10px; }
            .font-size-bar { padding: 5px 10px; font-size: 0.68rem; }
        }

        /* Overlay backdrop for sidebar on mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 190;
        }
        @media (max-width: 640px) {
            .sidebar-backdrop.active { display: block; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="toolbar-btn" id="btn-toc" title="Toggle Table of Contents">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            TOC
        </button>

        <div class="toolbar-divider"></div>

        <div class="toolbar-title">
            <strong>{{ file_name }}</strong>
        </div>

        <div class="progress-wrap" id="progress-wrap" style="display:none">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progress-bar"></div>
            </div>
            <span id="progress-text">0%</span>
        </div>

        <div class="toolbar-divider"></div>

        <button class="toolbar-btn" id="btn-theme-light" title="Light theme">☀</button>
        <button class="toolbar-btn" id="btn-theme-sepia" title="Sepia theme">📜</button>
        <button class="toolbar-btn active" id="btn-theme-dark" title="Dark theme">🌙</button>

        <div class="toolbar-divider"></div>

        <a class="toolbar-btn" href="{{ src|safe }}" download="{{ file_name }}" title="Download file">
            <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v6h5.66V9h3.84L12 2z"/></svg>
            Download
        </a>
    </div>

    <!-- Mobile sidebar backdrop -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div class="layout">
        <nav class="sidebar hidden" id="sidebar">
            <div class="sidebar-header">Table of Contents</div>
            <ul class="toc-list" id="toc-list">
                <li class="toc-item"><a href="#" style="color:var(--text-muted);font-style:italic">Loading…</a></li>
            </ul>
        </nav>

        <div class="reader-wrap" id="reader-wrap">
            <div class="font-size-bar" id="font-size-bar">
                <span class="label">Font size:</span>
                <button class="font-btn" id="font-dec">−</button>
                <span class="font-size-val" id="font-size-val">100%</span>
                <button class="font-btn" id="font-inc">+</button>
            </div>

            <!-- Reusable Loading overlay -->
            <div class="loading-overlay" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Opening ebook…</div>
            </div>

            <div id="epub-viewer"></div>
            <div id="pdf-viewer"></div>

            <!-- Reusable navigation buttons -->
            <button class="nav-arrow nav-prev" id="prev-btn" title="Previous page (←)">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="nav-arrow nav-next" id="next-btn" title="Next page (→)">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>

            <div class="error-screen" id="error-screen">
                <div class="error-icon">📖</div>
                <div class="error-title">Unable to render this file</div>
                <div class="error-desc" id="error-desc">This file format may not be supported for inline viewing.</div>
                <a class="download-btn" href="{{ src|safe }}" download="{{ file_name }}">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v6h5.66V9h3.84L12 2z"/></svg>
                    Download instead
                </a>
            </div>
        </div>
    </div>

    <div class="kb-hint">← → arrow keys to turn pages &nbsp;·&nbsp; T toggle contents</div>

<script>
(function () {
    const FILE_URL  = "{{ src|safe }}";
    const FILE_NAME = "{{ file_name }}";
    const FILE_TYPE = "{{ file_type }}";

    const sidebar      = document.getElementById('sidebar');
    const backdrop     = document.getElementById('sidebar-backdrop');
    const tocList      = document.getElementById('toc-list');
    const epubViewer   = document.getElementById('epub-viewer');
    const pdfViewer    = document.getElementById('pdf-viewer');
    const loading      = document.getElementById('loading');
    const errorScreen  = document.getElementById('error-screen');
    const errorDesc    = document.getElementById('error-desc');
    const progressBar  = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const progressWrap = document.getElementById('progress-wrap');
    const fontSizeBar  = document.getElementById('font-size-bar');
    const fontSizeVal  = document.getElementById('font-size-val');
    const prevBtn      = document.getElementById('prev-btn');
    const nextBtn      = document.getElementById('next-btn');

    document.getElementById('btn-toc').addEventListener('click', () => {
        const isMobile = window.innerWidth <= 640;
        sidebar.classList.toggle('hidden');
        if (isMobile) {
            backdrop.classList.toggle('active', !sidebar.classList.contains('hidden'));
        }
    });
    backdrop.addEventListener('click', () => {
        sidebar.classList.add('hidden');
        backdrop.classList.remove('active');
    });

    // Auto-hide sidebar on mobile at load
    if (window.innerWidth <= 640) sidebar.classList.add('hidden');

    let epubRendition  = null;
    let currentFontSize = 100;
    const THEMES = {
        light: { background: '#f7f4ef', color: '#1a1714' },
        sepia: { background: '#f5ecd7', color: '#3b2e1a' },
        dark:  { background: '#1c1a25', color: '#e0dde8' }
    };
    function applyEpubTheme(name) {
        document.querySelectorAll('[id^=btn-theme]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-theme-' + name).classList.add('active');
        if (!epubRendition) return;
        const t = THEMES[name];
        epubRendition.themes.default({
            body: { background: t.background + ' !important', color: t.color + ' !important' },
            p:    { color: t.color + ' !important' }
        });
    }
    document.getElementById('btn-theme-light').addEventListener('click', () => applyEpubTheme('light'));
    document.getElementById('btn-theme-sepia').addEventListener('click', () => applyEpubTheme('sepia'));
    document.getElementById('btn-theme-dark').addEventListener('click',  () => applyEpubTheme('dark'));

    function updateFontSize() {
        fontSizeVal.textContent = currentFontSize + '%';
        if (!epubRendition) return;
        epubRendition.themes.fontSize(currentFontSize + '%');
    }
    document.getElementById('font-dec').addEventListener('click', () => {
        if (currentFontSize > 60) { currentFontSize -= 10; updateFontSize(); }
    });
    document.getElementById('font-inc').addEventListener('click', () => {
        if (currentFontSize < 200) { currentFontSize += 10; updateFontSize(); }
    });

    function showError(msg) {
        loading.classList.add('hidden');
        errorDesc.textContent = msg || 'Unable to display this file.';
        errorScreen.style.display = 'flex';
        epubViewer.style.display  = 'none';
        pdfViewer.style.display   = 'none';
        fontSizeBar.style.display = 'none';
    }

    /* ── Progress Downloader ──────────────────────── */
    async function fetchWithProgress(url, onProgress) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength, 10) : 0;
        let loaded = 0;

        const reader = response.body.getReader();
        const chunks = [];
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            loaded += value.length;
            if (onProgress) {
                onProgress(loaded, total);
            }
        }

        const allChunks = new Uint8Array(loaded);
        let position = 0;
        for (const chunk of chunks) {
            allChunks.set(chunk, position);
            position += chunk.length;
        }

        return allChunks.buffer;
    }

    /* ── EPUB ─────────────────────────────────────── */
    async function loadEpub() {
        if (typeof ePub === 'undefined') {
            showError('EPUB.js library failed to load. Please download the file instead.');
            return;
        }
        pdfViewer.style.display = 'none';
        epubViewer.style.display = 'block';

        try {
            const loadingText = document.querySelector('#loading .loading-text');
            loadingText.textContent = 'Loading eBook…';
            loading.classList.remove('hidden');

            let lastUpdate = Date.now();
            const buffer = await fetchWithProgress(FILE_URL, (loaded, total) => {
                const now = Date.now();
                if (now - lastUpdate > 100) {
                    if (total) {
                        const pct = Math.round((loaded / total) * 100);
                        loadingText.textContent = `Downloading eBook… ${pct}%`;
                        progressBar.style.width = pct + '%';
                        progressText.textContent = pct + '%';
                    } else {
                        const mb = (loaded / (1024 * 1024)).toFixed(1);
                        loadingText.textContent = `Downloading eBook… ${mb} MB`;
                    }
                    lastUpdate = now;
                }
            });

            const book = ePub(buffer);
            const rendition = book.renderTo('epub-viewer', {
                width: '100%', height: '100%', spread: 'none', flow: 'paginated'
            });
            epubRendition = rendition;
            rendition.display();
            rendition.themes.default({
                body: { background: '#1c1a25 !important', color: '#e0dde8 !important' },
                p:    { color: '#e0dde8 !important' }
            });
            rendition.themes.fontSize('100%');

            book.ready.then(() => {
                loading.classList.add('hidden');
                progressWrap.style.display = 'flex';
                prevBtn.onclick = () => rendition.prev();
                nextBtn.onclick = () => rendition.next();
                return book.loaded.navigation;
            }).then(nav => {
                tocList.innerHTML = '';
                if (!nav || !nav.toc || nav.toc.length === 0) {
                    tocList.innerHTML = '<li class="toc-item"><a href="#" style="font-style:italic">No contents</a></li>';
                    return;
                }
                function renderToc(items, level) {
                    items.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'toc-item' + (level > 0 ? ' sub' : '');
                        const a = document.createElement('a');
                        a.href = '#';
                        a.textContent = item.label.trim();
                        a.addEventListener('click', e => {
                            e.preventDefault();
                            rendition.display(item.href);
                            tocList.querySelectorAll('a').forEach(x => x.classList.remove('active'));
                            a.classList.add('active');
                        });
                        li.appendChild(a);
                        tocList.appendChild(li);
                        if (item.subitems && item.subitems.length) renderToc(item.subitems, level + 1);
                    });
                }
                renderToc(nav.toc, 0);
            }).catch(err => {
                showError('Could not load EPUB: ' + err.message);
            });

            rendition.on('relocated', location => {
                const pct = Math.round((location.start.percentage || 0) * 100);
                progressBar.style.width  = pct + '%';
                progressText.textContent = pct + '%';
            });

            book.on('openFailed', err => {
                showError('Failed to open EPUB file: ' + (err && err.message ? err.message : 'Unknown error'));
            });
        } catch (err) {
            showError('Failed to fetch EPUB: ' + (err && err.message ? err.message : 'Unknown error'));
        }
    }

    /* ── PDF ──────────────────────────────────────── */
    let pdfDoc = null;
    let pdfPageNum = 1;
    let pdfRendering = false;
    let pdfPendingPageNum = null;

    async function loadPdf() {
        epubViewer.style.display    = 'none';
        fontSizeBar.style.display   = 'none';
        pdfViewer.style.display     = 'flex';
        pdfViewer.style.justifyContent = 'center';
        pdfViewer.style.alignItems = 'center';

        try {
            const loadingText = document.querySelector('#loading .loading-text');
            loadingText.textContent = 'Loading PDF…';
            loading.classList.remove('hidden');

            const pdfjsLib = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

            let lastUpdate = Date.now();
            const buffer = await fetchWithProgress(FILE_URL, (loaded, total) => {
                const now = Date.now();
                if (now - lastUpdate > 100) {
                    if (total) {
                        const pct = Math.round((loaded / total) * 100);
                        loadingText.textContent = `Downloading PDF… ${pct}%`;
                        progressBar.style.width = pct + '%';
                        progressText.textContent = pct + '%';
                    } else {
                        const mb = (loaded / (1024 * 1024)).toFixed(1);
                        loadingText.textContent = `Downloading PDF… ${mb} MB`;
                    }
                    lastUpdate = now;
                }
            });

            const loadingTask = pdfjsLib.getDocument({ data: buffer });
            pdfDoc = await loadingTask.promise;

            loading.classList.add('hidden');
            progressWrap.style.display = 'flex';
            
            pdfPageNum = 1;
            renderPdfPage(pdfPageNum);

            prevBtn.onclick = () => {
                if (pdfPageNum <= 1) return;
                pdfPageNum--;
                renderPdfPage(pdfPageNum);
            };
            nextBtn.onclick = () => {
                if (pdfPageNum >= pdfDoc.numPages) return;
                pdfPageNum++;
                renderPdfPage(pdfPageNum);
            };
        } catch (err) {
            showError('Could not render PDF: ' + (err && err.message ? err.message : 'Unknown error') + '. Try downloading the file.');
        }
    }

    async function renderPdfPage(num) {
        if (pdfRendering) {
            pdfPendingPageNum = num;
            return;
        }
        pdfRendering = true;
        pdfViewer.innerHTML = '';

        try {
            const page = await pdfDoc.getPage(num);
            const wrapperWidth = pdfViewer.clientWidth - 32;
            const unscaledViewport = page.getViewport({ scale: 1 });
            const scale = Math.min(1.8, wrapperWidth / unscaledViewport.width);
            
            const viewport = page.getViewport({ scale: scale });
            const canvas   = document.createElement('canvas');
            canvas.width   = viewport.width;
            canvas.height  = viewport.height;
            canvas.style.width  = '100%';
            canvas.style.maxWidth = viewport.width + 'px';
            canvas.style.height = 'auto';

            const wrap = document.createElement('div');
            wrap.className = 'pdf-page-wrap';
            wrap.appendChild(canvas);
            pdfViewer.appendChild(wrap);

            const renderContext = {
                canvasContext: canvas.getContext('2d'),
                viewport: viewport
            };
            
            await page.render(renderContext).promise;
            pdfRendering = false;
            
            progressBar.style.width  = Math.round((num / pdfDoc.numPages) * 100) + '%';
            progressText.textContent = `${num} / ${pdfDoc.numPages}`;

            if (pdfPendingPageNum !== null) {
                const nextNum = pdfPendingPageNum;
                pdfPendingPageNum = null;
                renderPdfPage(nextNum);
            }
        } catch (err) {
            pdfRendering = false;
            console.error('Error rendering PDF page:', err);
        }
    }

    /* ── Comic (CBZ only) ─────────────────────────── */
    let comicPages = [];
    let comicPageNum = 0;

    async function loadComic() {
        epubViewer.style.display    = 'none';
        fontSizeBar.style.display   = 'none';
        pdfViewer.style.display     = 'flex';
        pdfViewer.style.justifyContent = 'center';
        pdfViewer.style.alignItems = 'center';

        const script  = document.createElement('script');
        script.src    = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        script.integrity    = 'sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==';
        script.crossOrigin  = 'anonymous';
        document.head.appendChild(script);
        await new Promise((resolve, reject) => {
            script.onload  = resolve;
            script.onerror = () => reject(new Error('JSZip failed to load'));
        });

        try {
            const loadingText = document.querySelector('#loading .loading-text');
            loadingText.textContent = 'Loading CBZ archive…';
            loading.classList.remove('hidden');

            let lastUpdate = Date.now();
            const arrayBuffer = await fetchWithProgress(FILE_URL, (loaded, total) => {
                const now = Date.now();
                if (now - lastUpdate > 100) {
                    if (total) {
                        const pct = Math.round((loaded / total) * 100);
                        loadingText.textContent = `Downloading CBZ… ${pct}%`;
                        progressBar.style.width = pct + '%';
                        progressText.textContent = pct + '%';
                    } else {
                        const mb = (loaded / (1024 * 1024)).toFixed(1);
                        loadingText.textContent = `Downloading CBZ… ${mb} MB`;
                    }
                    lastUpdate = now;
                }
            });

            loadingText.textContent = 'Unpacking archive…';
            const zip = await JSZip.loadAsync(arrayBuffer);

            const imageExtensions = ['.jpg', '.jpeg', '.png', '.webp', '.gif', '.bmp'];
            const imageEntries = [];
            zip.forEach((relativePath, zipEntry) => {
                const lowerPath = relativePath.toLowerCase();
                if (imageExtensions.some(ext => lowerPath.endsWith(ext)) && !zipEntry.dir) {
                    imageEntries.push(zipEntry);
                }
            });
            imageEntries.sort((a, b) => a.name.localeCompare(b.name));

            if (imageEntries.length === 0) {
                throw new Error('No readable images found in the archive.');
            }

            comicPages = imageEntries;
            comicPageNum = 0;

            loading.classList.add('hidden');
            progressWrap.style.display = 'flex';
            
            renderComicPage(comicPageNum);

            prevBtn.onclick = () => {
                if (comicPageNum <= 0) return;
                comicPageNum--;
                renderComicPage(comicPageNum);
            };
            nextBtn.onclick = () => {
                if (comicPageNum >= comicPages.length - 1) return;
                comicPageNum++;
                renderComicPage(comicPageNum);
            };
        } catch (err) {
            showError('Could not render CBZ archive: ' + err.message + '. Try downloading the file.');
        }
    }

    async function renderComicPage(index) {
        pdfViewer.innerHTML = '';
        try {
            const entry = comicPages[index];
            const base64 = await entry.async('base64');
            const mimeType = entry.name.toLowerCase().endsWith('.png') ? 'image/png' : 'image/jpeg';

            const img = document.createElement('img');
            img.src   = `data:${mimeType};base64,${base64}`;
            img.style.cssText = 'width:100%;height:auto;display:block;max-height:85vh;object-fit:contain;';

            const wrap = document.createElement('div');
            wrap.className     = 'pdf-page-wrap';
            wrap.style.maxWidth = '800px';
            wrap.appendChild(img);
            pdfViewer.appendChild(wrap);

            const pageDisplayNum = index + 1;
            progressBar.style.width  = Math.round((pageDisplayNum / comicPages.length) * 100) + '%';
            progressText.textContent = `${pageDisplayNum} / ${comicPages.length}`;
        } catch (err) {
            console.error('Error rendering comic page:', err);
        }
    }

    /* ── Offline / unsupported ────────────────────── */
    function loadOfflineMessage(customMsg) {
        epubViewer.style.display    = 'none';
        fontSizeBar.style.display   = 'none';
        pdfViewer.style.display     = 'none';

        const msg = customMsg ||
            'This book is optimised for offline reading. Press Download to open it in your favourite ebook reader app.';
        showError(msg);
        errorScreen.querySelector('.error-icon').textContent  = '📚';
        errorScreen.querySelector('.error-title').textContent = 'Offline Ebook Ready';
    }

    /* ── Touch swipe (mobile page turns) ────────── */
    let _tx = 0, _ty = 0;
    document.addEventListener('touchstart', e => {
        _tx = e.changedTouches[0].clientX;
        _ty = e.changedTouches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - _tx;
        const dy = e.changedTouches[0].clientY - _ty;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
            if (dx < 0) nextBtn.click();
            else        prevBtn.click();
        }
    }, { passive: true });

    /* ── Keyboard navigation ─────────────────────── */
    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    prevBtn.click();
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  nextBtn.click();
        if (e.key === 't' || e.key === 'T') sidebar.classList.toggle('hidden');
    });

    /* ── Dispatch ────────────────────────────────── */
    switch (FILE_TYPE) {
        case 'epub':    loadEpub();  break;
        case 'pdf':     loadPdf();   break;
        case 'comic':   loadComic(); break;
        // CBR is RAR-compressed — JSZip cannot open it.
        // Serve a friendly download prompt rather than a broken viewer.
        case 'offline':
        default:
            loadOfflineMessage(
                FILE_TYPE === 'offline'
                    ? undefined
                    : `The .${FILE_NAME.split('.').pop()} format is not supported for inline viewing.`
            );
    }
})();
</script>
</body>
</html>
